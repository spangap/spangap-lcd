# spangap-lcd — on-device LVGL launcher + shell.
#
# LCD-side UI activator: when this straddle is in the dep graph (and
# --no-lcd is not set), the build folds every other straddle's
# esp-idf/lcd/ slice into that straddle's firmware component and calls
# its <prefix>LcdInit() from the generated dispatcher. Parallel to (not
# built atop) spangap-web — the LCD launcher is its own UI surface.
#
# Owns the display and the one LVGL context; paints program tiles, status bar,
# built-in Settings menu, built-in Log/CLI programs. The panel (SPI bus,
# controller, backlight, orientation) is configured through Kconfig
# (CONFIG_LCD_*); a consumer supplies only the input HAL (touch / cursor /
# button) via lcd_input.h.
schema_version: 1
name: spangap/spangap-lcd
prefix: lcd
version: 0.0.0
firmware: esp-idf
platforms: [idf]
# spangap-core is implicit (the empty-prefix platform foundation) — not listed.
# Auto-init: lcdInit() is folded into the generated spangapInitStraddles()
# dispatcher. lcd is the last of the platform band (core, net, web, lcd — see
# spangap-inside PLATFORM_ORDER), so its status bar can read net/storage/web
# state at init, and — the point of the band — every other straddle runs after
# it. So a straddle that paints a launcher tile / Settings pane is guaranteed
# the lcd task already exists; no ordering dance, no lazy-registration trick
# needed for correctness.
init:
  - call: lcdInit
# Board-agnostic LVGL features this shell needs (collected into the buildable's
# sdkconfig fragments like any other straddle's kconfig:). LV_USE_SNAPSHOT lets
# the recents switcher paint each running app's screen to a PSRAM buffer for its
# half-scale thumbnail (recents.cpp / LcdApp::_captureThumb).
kconfig:
  - CONFIG_LV_USE_SNAPSHOT=y
