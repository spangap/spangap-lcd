# spangap-lcd — on-device LVGL launcher + shell.
#
# LCD-side UI activator: when this straddle is in the dep graph (and
# --no-lcd is not set), the build folds every other straddle's
# esp-idf/lcd/ slice into that straddle's firmware component and calls
# its <prefix>LcdInit() from the generated dispatcher. Parallel to (not
# built atop) spangap-web — the LCD launcher is its own UI surface.
#
# Owns the display and the one LVGL context; paints program tiles, status bar,
# built-in Settings menu, built-in Log/CLI programs. The panel (SPI bus,
# controller, backlight, orientation) is configured through Kconfig
# (CONFIG_LCD_*); a consumer supplies only the input HAL (touch / cursor /
# button) via lcd_input.h.
schema_version: 1
name: spangap/spangap-lcd
prefix: lcd
version: 0.0.0
firmware: esp-idf
platforms: [idf]
# spangap-core is implicit (the empty-prefix platform foundation) — not listed.
# Auto-init: lcdInit() comes up as a boot hook in the generated serviceRunInit()
# walk. lcd registers last in the platform band (core, net, web, lcd — see
# spangap-inside PLATFORM_ORDER), so its status bar can read net/storage/web
# state at init, and — the point of the band — every other straddle runs after
# it. So a straddle that paints a launcher tile / Settings pane is guaranteed
# the lcd task already exists; no ordering dance, no lazy-registration trick
# needed for correctness.
init:
  - call: lcdInit
# Board-agnostic LVGL features this shell needs (collected into the buildable's
# sdkconfig fragments like any other straddle's kconfig:). LV_USE_SNAPSHOT lets
# the recents switcher paint each running app's screen to a PSRAM buffer for its
# half-scale thumbnail (recents.cpp / LcdApp::_captureThumb).
kconfig:
  - CONFIG_LV_USE_SNAPSHOT=y
  # LCD vector fonts (LCD_FONT_ENGINE). The engine choice `select`s
  # LV_USE_FREETYPE / LV_USE_TINY_TTF; these size the glyph caches, allocated
  # through lv_mem_spangap's PSRAM backend. LV_FONT_MONTSERRAT_14 is the stock
  # symbol face (FontAwesome merged) that lcdFont(SYMBOLS) chains as a fallback,
  # so LV_SYMBOL_* keeps rendering under every engine — keep it compiled in.
  # These are gated here (not in spangap-core's unconditional defaults) so a
  # headless build never asserts LVGL/LCD symbols that its config doesn't define.
  - CONFIG_LV_FONT_MONTSERRAT_14=y
  # LVGL diagnostics → our logger (lcd_lvgl.cpp registers a print callback under
  # the 'lvgl' tag). ERROR level keeps genuine failures and strips the noisy
  # deprecation warnings. Not LV_LOG_PRINTF — the callback owns routing.
  - CONFIG_LV_USE_LOG=y
  - CONFIG_LV_LOG_LEVEL_ERROR=y
  - CONFIG_LV_FREETYPE_CACHE_FT_GLYPH_CNT=256
  - CONFIG_LV_TINY_TTF_CACHE_GLYPH_CNT=256
  - CONFIG_LV_TINY_TTF_CACHE_KERNING_CNT=256
  # Render everything as vector, however small (no bitmap-font fallback for tiny
  # sizes). The clamp mechanism stays in Kconfig; this just disables it. Symbols
  # are vector too (symbols.ttf), so a FreeType image ships no rendered bitmap.
  - CONFIG_LCD_FONT_MIN_VECTOR_PX=0
