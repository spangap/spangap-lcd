description: "spangap-lcd: on-device LVGL launcher + settings shell for spangap device apps."
url: https://github.com/spangap/spangap-lcd
version: "0.1.0"
license: "Apache-2.0"
targets:
  - esp32s3
dependencies:
  idf:
    version: ">=5.5"
  # Cross-straddle deps (spangap-core) are declared in straddle.yaml's
  # `requires:`, not here — they're staged short-named via EXTRA_COMPONENT_DIRS
  # at consumer-build time. Listing them here too would double-stage them under
  # the manager's namespaced form and cause duplicate-symbol link errors.
  #
  # LVGL is pinned here, not by the consumer: spangap-lcd ships its own
  # launcher / settings shell built against the LVGL v9 API, so we own the
  # version. Consumers don't need to list lvgl in their manifest. The link
  # is still Kconfig-gated in CMakeLists.txt, so screen-less builds compile
  # LVGL but don't link it into the final binary. esp_lcd_touch is brought
  # in transitively by the consumer's specific touch driver (e.g.
  # esp_lcd_touch_gt911 in reticulous-tdeck).
  lvgl/lvgl:
    version: "^9.2"
